<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar Agent</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0e12;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 32px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(to right, #a5b4fc, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 24px;
    }
    textarea {
      width: 100%;
      height: 120px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      color: var(--text);
      padding: 16px;
      font-size: 16px;
      font-family: inherit;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
    }
    button {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover {
      background: var(--accent-hover);
    }
    button:active {
      transform: scale(0.98);
    }
    .status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
    }
    .status.error { color: #f87171; }
    .status.success { color: #34d399; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Calendar Agent</h1>
    <p>Type your event in natural language. We'll parse it and add it directly to your calendar.</p>
    
    <textarea id="eventInput" placeholder="e.g. Basketball Practice 830-1030pm 7th July" required></textarea>
    <button id="submitBtn">Create Event</button>
    <div id="statusMsg" class="status"></div>
  </div>

  <script>
    const eventInput = document.getElementById('eventInput');
    const submitBtn = document.getElementById('submitBtn');
    const statusMsg = document.getElementById('statusMsg');

    function formatDateToICS(isoString) {
      const date = new Date(isoString);
      return date.toISOString().replace(/[-:]/g, '').split('.')[0] + 'Z';
    }

    function generateICS(event) {
      const start = formatDateToICS(event.start);
      const end = formatDateToICS(event.end);
      const created = formatDateToICS(new Date().toISOString());

      return [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//Calendar Agent//EN',
        'BEGIN:VEVENT',
        `UID:${Date.now()}@calendaragent`,
        `DTSTAMP:${created}`,
        `DTSTART:${start}`,
        `DTEND:${end}`,
        `SUMMARY:${event.title}`,
        `DESCRIPTION:${event.notes || ''}`,
        `LOCATION:${event.location || ''}`,
        'END:VEVENT',
        'END:VCALENDAR'
      ].join('\r\n');
    }

    submitBtn.addEventListener('click', async () => {
      const text = eventInput.value.trim();
      if (!text) return;

      submitBtn.disabled = true;
      statusMsg.className = 'status';
      statusMsg.textContent = 'Parsing event...';

      try {
        const response = await fetch('/parse-event', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error || 'Failed to parse');
        }

        if (data.needs_clarification) {
          statusMsg.className = 'status error';
          statusMsg.textContent = `Clarification: ${data.clarification_question}`;
          submitBtn.disabled = false;
          return;
        }

        statusMsg.className = 'status success';
        statusMsg.textContent = 'Creating .ics file...';

        const icsContent = generateICS(data);
        const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `${data.title.replace(/\s+/g, '_') || 'event'}.ics`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);

        statusMsg.textContent = 'Done! Tap the downloaded file to add to calendar.';
        eventInput.value = '';
      } catch (err) {
        statusMsg.className = 'status error';
        statusMsg.textContent = err.message;
      } finally {
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
